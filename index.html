<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Search</title>
    <link rel="stylesheet" href="Country_Search.css">
</head>

<body>
    <header>
        <h1 class="heading">World Countries List</h1>
        <p class="totalCountries">Total number of countries : ${}</p>
        <p class="countriesAndCount"><!--Countries start with ${} are ${}--></p>
        <div class="buttons">
            <button class="startingWord">Starting Word</button>
            <button class="searchWith">Search with any word</button>
            <button class="sort"><img src="Images/sort.png" alt="sort"></button>
        </div>
        <div class="inputAndIcon">
            <input type="text" class="country" name='country' placeholder="Search Country" />
            <button class="search"><img src="Images/search2.png" alt="searchIcon"></button>
        </div>
        
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content">
                <button class="close-btn" id="closeModal">&times;</button>
                <div id="modalBody">
                </div>
            </div>
        </div>
    </header>
</body>
<script src="Country_Search.js" type="module"></script>

</html>
